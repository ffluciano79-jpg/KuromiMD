<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yoru Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#050507;
  color:#fff;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at top,#111,#000);
  z-index:-1;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:80px auto;
  padding:20px;
}

/* CARD PRINCIPAL */
.main{
  background:rgba(255,255,255,0.03);
  border-radius:30px;
  padding:40px 25px;
  box-shadow:0 0 60px rgba(255,77,136,0.08);
  border:1px solid rgba(255,255,255,0.05);
  text-align:center;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  font-family:'Orbitron';
  letter-spacing:2px;
  font-size:20px;
}

.time{
  background:rgba(255,255,255,0.05);
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
}

/* STATUS BADGE */
.badge{
  display:inline-block;
  padding:8px 20px;
  border-radius:30px;
  background:rgba(255,255,255,0.05);
  margin:20px 0;
  font-size:13px;
}

/* TITULO */
h1{
  font-size:2.3rem;
  margin-bottom:15px;
}

p{
  opacity:0.6;
  font-size:14px;
  line-height:1.6;
  max-width:500px;
  margin:auto;
}

/* BOTÃO */
.btn{
  margin-top:30px;
  width:100%;
  padding:18px;
  border-radius:20px;
  border:none;
  background:linear-gradient(45deg,#111,#1a1a1a);
  color:#fff;
  font-weight:500;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.03);
  box-shadow:0 0 30px rgba(255,255,255,0.1);
}

/* TAGS */
.tags{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.tag{
  background:rgba(255,255,255,0.05);
  padding:8px 15px;
  border-radius:20px;
  font-size:12px;
}

/* CONTROLES */
.controls{
  margin-top:25px;
  display:flex;
  gap:10px;
  justify-content:center;
}

.small-btn{
  padding:10px 15px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
  background:transparent;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="main">

<div class="top">
  <div class="logo">YORU SYSTEM</div>
  <div class="time" id="time"></div>
</div>

<div class="badge">Sistema online</div>

<h1>Controle inteligente e performance estável.</h1>

<p>
Infraestrutura pensada para automação avançada, estabilidade contínua e respostas rápidas.
Projetado para funcionar de forma eficiente sem comprometer a experiência.
</p>

<button class="btn" onclick="window.open('https://wa.me/558481625194')">
Canal Oficial
</button>

<div class="tags">
  <div class="tag">alto desempenho</div>
  <div class="tag">estrutura estável</div>
  <div class="tag">integração simples</div>
</div>

<div class="controls">
  <button class="small-btn" onclick="toggleMusic()">Música</button>
  <button class="small-btn" onclick="nextMusic()">Próxima</button>
</div>

</div>
</div>

<audio id="music"></audio>

<script>
// relógio
setInterval(()=>{
 let d = new Date()
 document.getElementById("time").innerText =
 d.getHours()+\":\"+String(d.getMinutes()).padStart(2,'0')
},1000)

// música
let playlist=[
\"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3\",
\"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/track2.mp3\"
]

let i=0
let music=document.getElementById(\"music\")
music.src=playlist[i]

function toggleMusic(){
 music.paused ? music.play() : music.pause()
}

function nextMusic(){
 i=(i+1)%playlist.length
 music.src=playlist[i]
 music.play()
}

music.addEventListener(\"ended\",nextMusic)
</script>

</body>
</html>
