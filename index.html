<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--main-color:#ff4d88;}

body{
 font-family:'Inter',sans-serif;
 background:#040406;
 color:#fff;
 overflow-x:hidden;
}

/* LOADING */
#loading{
 position:fixed;inset:0;background:#040406;
 display:flex;align-items:center;justify-content:center;
 z-index:9999;
 transition:.5s;
}
.loader-box{
 width:90%;max-width:320px;padding:30px 20px;
 border-radius:30px;background:rgba(255,255,255,0.03);
 backdrop-filter:blur(20px);text-align:center;
}
.loader-img{width:90px;height:90px;margin:auto;border-radius:20px;overflow:hidden;animation:spin 3s infinite}
.loader-img img{width:100%;height:100%;object-fit:cover;}
@keyframes spin{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}

.loader-bar{height:6px;background:#222;border-radius:10px;margin-top:10px;overflow:hidden}
.loader-progress{height:100%;width:0;background:var(--main-color);animation:load 3s forwards}
@keyframes load{to{width:100%}}

/* MENU */
.menu-btn{
 position:fixed;top:20px;right:20px;
 background:#111;padding:10px 14px;border-radius:12px;
 cursor:pointer;z-index:10;
 box-shadow:0 0 10px rgba(0,0,0,0.5);
}
.menu{
 position:fixed;top:0;right:-270px;width:270px;height:100%;
 background:#0a0a0f;padding:20px;transition:.3s;
 display:flex;flex-direction:column;gap:15px;z-index:10;
}
.menu.active{right:0;}

.menu h3{font-size:14px;opacity:.7}

.menu-slider{
 width:100%;appearance:none;height:6px;
 background:#222;border-radius:10px;outline:none;
}
.menu-slider::-webkit-slider-thumb{
 appearance:none;width:14px;height:14px;
 border-radius:50%;background:var(--main-color);
 cursor:pointer;box-shadow:0 0 10px var(--main-color);
}

/* BACKGROUND */
.neon{
 position:fixed;width:15px;height:15px;border-radius:50%;
 pointer-events:none;
 background:var(--main-color);
 box-shadow:0 0 20px var(--main-color),0 0 40px var(--main-color);
 z-index:999;
}
canvas{position:fixed;inset:0;z-index:0;}

/* MAIN */
.container{max-width:850px;margin:80px auto;padding:20px;position:relative;z-index:1;}
.main{
 background:rgba(255,255,255,0.04);
 backdrop-filter:blur(20px);
 border-radius:30px;padding:40px 25px;
 border:1px solid rgba(255,255,255,0.06);
 text-align:center;
}

.logo{
 font-family:'Orbitron';
 color:var(--main-color);
 text-shadow:0 0 10px var(--main-color);
}
.time{background:rgba(255,255,255,0.05);padding:8px 14px;border-radius:20px;}

.avatar{
 width:100px;height:100px;border-radius:50%;
 margin:20px auto;
 box-shadow:0 0 30px var(--main-color);
 animation:float 4s ease-in-out infinite;
}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.btn{
 margin-top:25px;width:100%;padding:18px;
 border-radius:18px;border:none;
 background:var(--main-color);color:#fff;
 cursor:pointer;
}
</style>
</head>

<body>

<div id="loading">
 <div class="loader-box">
  <div class="loader-img">
   <img src="https://i.ibb.co/Rp52gZxf/4a673d55961f.jpg">
  </div>
  <h2>YORU SYSTEM</h2>
  <p>• Lucianz •</p>
  <div class="loader-bar"><div class="loader-progress"></div></div>
 </div>
</div>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="menu" id="menu">
<button onclick="toggleMenu()">← Voltar</button>

<h3>Cor do Tema</h3>
<input type="color" onchange="setColor(this.value)">

<h3>Volume</h3>
<input type="range" min="0" max="1" step="0.01" class="menu-slider" oninput="setVolume(this.value)">

<h3>Progresso</h3>
<input type="range" min="0" max="100" class="menu-slider" id="seekbar" oninput="seekMenu(this.value)">
</div>

<canvas id="particles"></canvas>
<div class="neon" id="neon"></div>

<div class="container">
<div class="main">

<div style="display:flex;justify-content:space-between">
<div class="logo">YORU SYSTEM</div>
<div class="time" id="time"></div>
</div>

<img class="avatar" src="https://i.ibb.co/6RCGNGD4/bf962842325b.jpg">

<h1>Yoru Uma Bot Feita Pra Grupo</h1>

<button class="btn" onclick="toggleMusic()">Play / Pause</button>

<button class="btn" onclick="window.open('https://whatsapp.com/channel/0029Vb5wx3GId7nT87R9gn3L')">
Canal Oficial
</button>

<button class="btn" onclick="window.open('https://wa.me/5584981625194')">
Falar com o Dono
</button>

</div>
</div>

<audio id="music"></audio>

<script>
setInterval(()=>{
 let d=new Date()
 document.getElementById("time").innerText=
 d.getHours()+":"+String(d.getMinutes()).padStart(2,'0')
},1000)

let playlist=[
"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3",
"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/7713x1kpz.mp3"
]

let i=0
let music=document.getElementById("music")
music.src=playlist[i]

function toggleMusic(){music.paused?music.play():music.pause()}

function setVolume(v){music.volume=v}

function seekMenu(v){
 if(music.duration){
  music.currentTime=(v/100)*music.duration
 }
}

function toggleMenu(){
 document.getElementById("menu").classList.toggle("active")
}

function setColor(c){
 document.documentElement.style.setProperty('--main-color',c)

 // detectar se cor é clara ou escura
 let r=parseInt(c.substr(1,2),16)
 let g=parseInt(c.substr(3,2),16)
 let b=parseInt(c.substr(5,2),16)

 let brightness=(r*299+g*587+b*114)/1000

 if(brightness > 180){
  document.body.style.color="#000"
 }else{
  document.body.style.color="#fff"
 }
}

/* neon */
let neon=document.getElementById("neon")
document.addEventListener("mousemove",(e)=>{
 neon.style.left=e.clientX+"px"
 neon.style.top=e.clientY+"px"
})

/* particles */
let canvas=document.getElementById("particles")
let ctx=canvas.getContext("2d")
canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]
for(let i=0;i<80;i++){
 particles.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*2,
  dx:(Math.random()-0.5),
  dy:(Math.random()-0.5)
 })
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height)
 particles.forEach(p=>{
  ctx.beginPath()
  ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
  ctx.fillStyle="rgba(255,255,255,0.5)"
  ctx.fill()
  p.x+=p.dx
  p.y+=p.dy
  if(p.x<0||p.x>canvas.width)p.dx*=-1
  if(p.y<0||p.y>canvas.height)p.dy*=-1
 })
 requestAnimationFrame(draw)
}
draw()

window.onload=()=>{
 setTimeout(()=>{
  document.getElementById("loading").style.opacity="0"
  setTimeout(()=>{document.getElementById("loading").style.display="none"},500)
 },3000)
}
</script>

</body>
</html>
