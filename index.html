<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Quicksand',sans-serif;
  background:#05050a;
  color:#fff;
  overflow:hidden;
}

/* LOADING */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#05050a;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.loader-bar{
  width:200px;
  height:4px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  margin-top:20px;
}

.loader-fill{
  width:0%;
  height:100%;
  background:#ff4d88;
  animation:load 2.5s forwards;
}

@keyframes load{
  to{width:100%}
}

/* MAIN */
#main{
  display:none;
  animation:fade 1s ease forwards;
}

@keyframes fade{
  from{opacity:0; transform:scale(1.02)}
  to{opacity:1; transform:scale(1)}
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1534447677768-be436bb09401') center/cover;
  opacity:0.15;
  z-index:-1;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(15px);
}

nav h1{
  font-family:'Orbitron';
  color:#ff4d88;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img{
  width:150px;
  border-radius:50%;
  box-shadow:0 0 40px rgba(255,77,136,0.6);
  animation:float 4s infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.hero h2{
  font-size:3rem;
  font-family:'Orbitron';
  margin-top:15px;
}

/* DOTS */
.dots::after{
  content:"";
  animation:dots 1.5s infinite;
}

@keyframes dots{
  0%{content:""}
  33%{content:"."}
  66%{content:".."}
  100%{content:"..."}
}

/* BUTTONS */
.controls{
  margin-top:25px;
  display:flex;
  gap:12px;
}

.btn{
  padding:10px 20px;
  border-radius:25px;
  border:1px solid rgba(255,77,136,0.5);
  background:rgba(255,77,136,0.1);
  color:#fff;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  background:#ff4d88;
  box-shadow:0 0 20px rgba(255,77,136,0.6);
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.04);
  padding:25px;
  border-radius:18px;
  border:1px solid rgba(255,77,136,0.2);
  transition:.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 25px rgba(255,77,136,0.4);
}

.status{
  font-size:1.4rem;
  color:#8affc1;
}

footer{
  text-align:center;
  padding:20px;
  opacity:0.5;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h2 style="font-family:Orbitron;color:#ff4d88">Yoru</h2>
  <div class="loader-bar">
    <div class="loader-fill"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">

<nav>
  <h1>Yoru</h1>
</nav>

<section class="hero">
  <img src="https://i.ibb.co/6RCGNGD4/bf962842325b.jpg">
  <h2>Yoru Bot</h2>
  <p class="dots">carregando sistema</p>

  <div class="controls">
    <button class="btn" onclick="toggleMusic()">Músicas</button>
    <button class="btn" onclick="nextMusic()">Próxima</button>
    <button class="btn" onclick="window.open('https://wa.me/558481625194')">Ver Dono</button>
  </div>
</section>

<section class="section">
  <h2>Recursos</h2>
  <div class="grid">
    <div class="card">Proteção completa de grupos</div>
    <div class="card">Sistema inteligente automático</div>
    <div class="card">Diversão e interação</div>
    <div class="card">Downloads integrados</div>
    <div class="card">Controle avançado</div>
    <div class="card">Alta velocidade</div>
  </div>
</section>

<section class="section">
  <h2>Status</h2>
  <div class="status" id="statusText"></div>
</section>

<footer>
  Yoru System
</footer>

</div>

<audio id="music"></audio>

<script>
// LOADER
setTimeout(()=>{
  document.getElementById("loader").style.display="none"
  document.getElementById("main").style.display="block"
  document.body.style.overflow="auto"
},2500)

// MUSIC
let playlist = [
"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3",
"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/track2.mp3"
]

let index = 0
let music = document.getElementById("music")
music.src = playlist[index]

function toggleMusic(){
  music.paused ? music.play() : music.pause()
}

function nextMusic(){
  index = (index+1)%playlist.length
  music.src = playlist[index]
  music.play()
}

music.addEventListener("ended", nextMusic)

// STATUS
setInterval(()=>{
  document.getElementById("statusText").innerText = "online • " + (99+Math.random()).toFixed(2)+"%"
},2000)
</script>

</body>
</html>
