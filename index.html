<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Quicksand',sans-serif;
  background:#05050a;
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND ANIME SOFT */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1534447677768-be436bb09401') center/cover;
  opacity:0.18;
  z-index:-2;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(15px);
  z-index:100;
}

nav h1{
  font-family:'Orbitron';
  letter-spacing:2px;
  color:#ff4d88;
}

nav a{
  color:#ddd;
  margin-left:25px;
  text-decoration:none;
  font-size:14px;
  transition:.3s;
}

nav a:hover{
  color:#ff4d88;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img{
  width:150px;
  border-radius:50%;
  box-shadow:0 0 40px rgba(255,77,136,0.6);
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

.hero h2{
  font-size:3rem;
  font-family:'Orbitron';
  margin-top:15px;
}

.hero p{
  opacity:0.7;
  margin:10px 0 25px;
}

/* BUTTONS */
.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:10px 22px;
  border-radius:25px;
  border:1px solid rgba(255,77,136,0.5);
  background:rgba(255,77,136,0.1);
  color:#fff;
  cursor:pointer;
  backdrop-filter:blur(8px);
  transition:.3s;
}

.btn:hover{
  background:#ff4d88;
  box-shadow:0 0 20px rgba(255,77,136,0.6);
}

/* CHAT */
.chat{
  margin-top:30px;
  width:300px;
  background:rgba(0,0,0,0.5);
  border-radius:15px;
  padding:15px;
  height:180px;
  overflow:auto;
  font-size:13px;
}

.msg{margin:6px 0}
.bot{color:#ff9ecb}
.user{text-align:right}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.04);
  padding:25px;
  border-radius:18px;
  border:1px solid rgba(255,77,136,0.2);
  transition:.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 25px rgba(255,77,136,0.4);
}

.status{
  font-size:1.4rem;
  color:#8affc1;
}

footer{
  text-align:center;
  padding:20px;
  opacity:0.5;
}
</style></head><body><nav>
  <h1>Yoru</h1>
  <div>
    <a href="#">Início</a>
    <a href="#funcoes">Funções</a>
    <a href="#status">Status</a>
  </div>
</nav><section class="hero">
  <img src="https://i.ibb.co/6RCGNGD4/bf962842325b.jpg">
  <h2>Yoru Bot</h2>
  <p id="typing"></p>  <div class="controls">
    <button class="btn" onclick="toggleMusic()">Play</button>
    <button class="btn" onclick="nextMusic()">Next</button>
    <button class="btn" onclick="window.open('https://wa.me/558481625194')">Entrar</button>
  </div>  <div class="chat" id="chat"></div>
</section><section class="section" id="funcoes">
  <h2>Recursos</h2>
  <div class="grid">
    <div class="card">Proteção completa de grupos</div>
    <div class="card">Sistema inteligente automático</div>
    <div class="card">Diversão e interação</div>
    <div class="card">Downloads integrados</div>
    <div class="card">Controle avançado</div>
    <div class="card">Alta velocidade</div>
  </div>
</section><section class="section" id="status">
  <h2>Status</h2>
  <div class="status" id="statusText"></div>
</section><footer>
  Yoru System
</footer><audio id="music"></audio>

<script>
let playlist = [
"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3",
"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/7713x1kpz.mp3"
]

let index = 0
let music = document.getElementById("music")
music.src = playlist[index]

function toggleMusic(){
  music.paused ? music.play() : music.pause()
}

function nextMusic(){
  index = (index+1)%playlist.length
  music.src = playlist[index]
  music.play()
}

music.addEventListener("ended", nextMusic)

setInterval(()=>{
  document.getElementById("statusText").innerText = "online • " + (99+Math.random()).toFixed(2)+"%"
},2000)

// typing
let txt="automação elegante e poderosa"
let i=0
function type(){
 if(i<txt.length){
  document.getElementById("typing").innerHTML+=txt[i]
  i++
  setTimeout(type,40)
 }
}
type()

// chat
let msgs=["menu","carregando","casal","resultado pronto","play música"]
let c=0
let chat=document.getElementById("chat")
function runChat(){
 if(c<msgs.length){
  let d=document.createElement("div")
  d.className="msg "+(c%2?"bot":"user")
  d.innerText=msgs[c]
  chat.appendChild(d)
  chat.scrollTop=chat.scrollHeight
  c++
  setTimeout(runChat,1200)
 }
}
runChat()
</script></body>
</html>
