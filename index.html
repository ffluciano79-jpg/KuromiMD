<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial;
  background:#0a0a0f;
  color:white;
  overflow-x:hidden;
}

/* FUNDO ANIMADO */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:3rem;
  color:#ff0055;
  text-shadow:0 0 30px #ff0055;
}

.hero p{
  opacity:.7;
  margin:10px;
}

/* BOTÕES */
.btn{
  background:#ff0055;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  margin:10px;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.1);
  background:#ff3366;
}

/* SEÇÕES */
.section{
  padding:60px 20px;
  text-align:center;
}

.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  margin:20px auto;
  max-width:600px;
  box-shadow:0 0 20px rgba(255,0,100,0.2);
  transition:.3s;
}

.card:hover{
  transform:scale(1.05);
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  opacity:.5;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- HERO -->
<div class="hero">
  <h1>🤖 Yoru Bot</h1>
  <p>Automação • Diversão • Poder</p>
  <button class="btn" onclick="playMusic()">🎵 Música</button>
  <button class="btn" onclick="window.open('https://wa.me/+55 85 9739-2253')">📱 Usar Bot</button>
</div>

<!-- SOBRE -->
<div class="section">
  <div class="card">
    <h2>📌 Sobre</h2>
    <p>Um bot completo com comandos, IA e diversão.</p>
  </div>
</div>

<!-- COMANDOS -->
<div class="section">
  <div class="card">
    <h2>⚙️ Comandos</h2>
    <p>&menu • &play • &casal • &yoru</p>
  </div>
</div>

<!-- STATUS -->
<div class="section">
  <div class="card">
    <h2>📊 Status</h2>
    <p style="color:#00ff88;">Online ✅</p>
  </div>
</div>

<footer>
  © 2026 - Yoru Bot
</footer>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3">
</audio>

<script>
// MUSICA
let music = document.getElementById("music")
function playMusic(){
  if(music.paused){
    music.play()
  } else {
    music.pause()
  }
}

// FUNDO ANIMADO (PARTÍCULAS)
let canvas = document.getElementById("bg")
let ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let particles = []

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*1
  })
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height)

  particles.forEach(p=>{
    p.y += p.speed
    if(p.y > canvas.height) p.y = 0

    ctx.fillStyle = "#ff0055"
    ctx.fillRect(p.x,p.y,p.size,p.size)
  })

  requestAnimationFrame(animate)
}

animate()
</script>

</body>
</html>
