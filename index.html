<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot Ultra</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:#020204;
  color:#fff;
  overflow-x:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader-text{
  font-family:'Orbitron';
  font-size:2rem;
  color:#ff0055;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:.2}
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

nav{
  position:fixed;
  width:100%;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  backdrop-filter:blur(15px);
  background:rgba(0,0,0,0.4);
}

nav h2{
  color:#ff0055;
  font-family:'Orbitron';
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:4rem;
  background:linear-gradient(90deg,#ff0055,#ff66aa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.btn{
  padding:14px 30px;
  border-radius:40px;
  border:none;
  background:#ff0055;
  color:white;
  cursor:pointer;
  margin:10px;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px #ff0055;
}

.section{
  padding:100px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  border:1px solid rgba(255,0,100,0.2);
  transition:.4s;
}

.card:hover{
  transform:translateY(-15px);
  box-shadow:0 0 40px rgba(255,0,100,0.4);
}

.status{
  font-size:1.8rem;
  color:#00ff88;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{opacity:1}
  50%{opacity:.3}
  100%{opacity:1}
}

footer{
  padding:30px;
  text-align:center;
  opacity:.6;
}
</style></head><body><div id="loader">
  <div class="loader-text">Carregando Yoru...</div>
</div><canvas id="bg"></canvas>

<nav>
  <h2>Yoru Ultra</h2>
</nav><section class="hero">
  <h1>Yoru Bot</h1>
  <p>O sistema mais avançado de automação WhatsApp</p><button class="btn" onclick="playMusic()">🎵 Música</button> <button class="btn" onclick="window.open('https://wa.me/558481625194')">🚀 Usar Bot</button>

</section><section class="section">
  <h2>🔥 Recursos Premium</h2>  <div class="grid">
    <div class="card">Anti-link inteligente</div>
    <div class="card">Sistema anti-bot automático</div>
    <div class="card">Registro de usuários</div>
    <div class="card">Download de mídias</div>
    <div class="card">IA integrada</div>
    <div class="card">Controle total de grupos</div>
  </div>
</section><section class="section">
  <h2>📊 Status</h2>
  <p class="status" id="status">Conectando...</p>
</section><footer>
  © 2026 - Yoru Ultra System
</footer><audio id="music" loop>
  <source src="https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3">
</audio><script>
// loader
window.onload = () => {
  setTimeout(()=>{
    document.getElementById('loader').style.display='none'
  },1500)
}

// musica
let music = document.getElementById("music")
function playMusic(){
  music.paused ? music.play() : music.pause()
}

// status fake
setInterval(()=>{
  document.getElementById("status").innerText = "Online • " + (99.5 + Math.random()).toFixed(2) + "% uptime"
},2000)

// particulas avançadas
let canvas = document.getElementById("bg")
let ctx = canvas.getContext("2d")
canvas.width = window.innerWidth
canvas.height = window.innerHeight

let particles = []

for(let i=0;i<150;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*2
  })
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height)

  particles.forEach(p=>{
    p.y += p.speed
    if(p.y > canvas.height) p.y = 0

    ctx.fillStyle = "#ff0055"
    ctx.fillRect(p.x,p.y,p.size,p.size)
  })

  requestAnimationFrame(animate)
}

animate()
</script></body>
</html>
