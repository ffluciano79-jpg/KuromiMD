<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* HEADER */
header {
  padding: 25px;
}

header h1 {
  font-size: 2.5rem;
  color: #ff0055;
}

header p {
  opacity: 0.7;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
}

/* CARD */
.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
  box-shadow: 0 0 15px rgba(255,0,100,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
}

/* BOTÕES */
button {
  background: #ff0055;
  border: none;
  padding: 10px 15px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  background: #ff3366;
}

/* STATUS */
.status {
  display: flex;
  justify-content: space-between;
}

/* JOGO */
#gameBox {
  margin-top: 15px;
}

#target {
  width: 60px;
  height: 60px;
  background: #ff0055;
  border-radius: 50%;
  position: relative;
  margin: 20px auto;
  cursor: pointer;
  display: none;
}

.score {
  font-size: 18px;
  margin-top: 10px;
}

/* FOOTER */
footer {
  margin-top: 20px;
  opacity: 0.5;
}
</style>
</head>

<body>

<header>
  <h1>🤖 Yoru Bot</h1>
  <p>Um bot feito por um cara entediado.</p>
</header>

<div class="container">

  <!-- SOBRE -->
  <div class="card">
    <h2>📌 Sobre</h2>
    <p>Bot criado para diversão, moderação e utilidades.</p>
  </div>

  <!-- COMANDOS -->
  <div class="card">
    <h2>⚙️ Comandos</h2>
    <p>🩸 &menu</p>
    <p>😂 &casal</p>
    <p>🎵 &play</p>
    <p>🕷 &dono</p>
    <p>🤖 &yoru</p>
  </div>

  <!-- STATUS -->
  <div class="card">
    <h2>📊 Status</h2>
    <div class="status">
      <span>Bot:</span>
      <span style="color:#00ff88;">Online ✅</span>
    </div>
    <div class="status">
      <span>Versão:</span>
      <span>1.6.0</span>
    </div>
  </div>

  <!-- INTERAÇÃO -->
  <div class="card">
    <h2>🚀 Interação</h2>
    <button onclick="mensagem()">Mensagem</button>
    <button onclick="mudarCor()">Mudar cor</button>
  </div>

  <!-- JOGO -->
  <div class="card">
    <h2>🎮 Mini Jogo (Clique rápido)</h2>
    <button onclick="startGame()">Iniciar Jogo</button>

    <div id="gameBox">
      <div id="target"></div>
      <div class="score">Pontuação: <span id="score">0</span></div>
    </div>
  </div>

</div>

<footer>
  <p>© 2026 - Criado por Lucianz</p>
</footer>

<script>
let score = 0
let gameActive = false

function mensagem() {
  alert("🔥 Bem-vindo ao Yoru Bot!")
}

function mudarCor() {
  document.body.style.background =
    "linear-gradient(135deg, #" + Math.floor(Math.random()*999999) + ", #000)"
}

/* JOGO */
function startGame() {
  score = 0
  gameActive = true
  document.getElementById("score").innerText = score
  document.getElementById("target").style.display = "block"
  moverAlvo()
}

function moverAlvo() {
  if (!gameActive) return

  const target = document.getElementById("target")

  let x = Math.random() * 250
  let y = Math.random() * 250

  target.style.transform = `translate(${x}px, ${y}px)`

  setTimeout(moverAlvo, 800)
}

document.getElementById("target").onclick = () => {
  if (!gameActive) return

  score++
  document.getElementById("score").innerText = score
}
</script>

</body>
</html>
