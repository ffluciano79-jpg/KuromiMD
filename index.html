<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
 --main-color:#ff4d88;
 --text-color:#fff;
 --card-bg:rgba(255,255,255,0.04);
 --soft-bg:rgba(255,255,255,0.05);
}

/* ANIMAÇÃO PREMIUM */
body{
 font-family:'Inter',sans-serif;
 background:#040406;
 color:var(--text-color);
 overflow-x:hidden;
 transition:all .4s ease;
 animation:fadeIn .6s ease;
}

@keyframes fadeIn{
 from{opacity:0;transform:scale(.97)}
 to{opacity:1;transform:scale(1)}
}

/* LOADING */
#loading{
 position:fixed;inset:0;background:#040406;
 display:flex;align-items:center;justify-content:center;
 z-index:9999;transition:.5s;
}

/* MENU */
.menu-btn{
 position:fixed;top:20px;right:20px;
 background:#111;padding:10px 14px;border-radius:12px;
 cursor:pointer;z-index:10;
}

.menu{
 position:fixed;top:0;right:-270px;width:270px;height:100%;
 background:#0a0a0f;padding:20px;transition:.4s;
 display:flex;flex-direction:column;gap:15px;z-index:10;
}
.menu.active{right:0;}

/* PALETA */
.palette{
 display:flex;flex-wrap:wrap;gap:10px;
}
.color{
 width:30px;height:30px;border-radius:50%;
 cursor:pointer;border:2px solid transparent;
 transition:.3s;
}
.color:hover{transform:scale(1.2)}
.color.active{border:2px solid #fff}

/* MAIN */
.container{max-width:850px;margin:80px auto;padding:20px;}
.main{
 background:var(--card-bg);
 backdrop-filter:blur(20px);
 border-radius:30px;padding:40px 25px;
 text-align:center;
 transition:.4s;
}

.logo{
 font-family:'Orbitron';
 color:var(--main-color);
 text-shadow:0 0 15px var(--main-color);
}

.time{
 background:var(--soft-bg);
 padding:8px 14px;border-radius:20px;
}

.avatar{
 width:100px;height:100px;border-radius:50%;
 margin:20px auto;
 box-shadow:0 0 30px var(--main-color);
 animation:float 4s infinite;
}

@keyframes float{
 0%,100%{transform:translateY(0)}
 50%{transform:translateY(-10px)}
}

.btn{
 margin-top:20px;width:100%;padding:18px;
 border-radius:18px;border:none;
 background:var(--main-color);
 color:#fff;font-weight:600;
 cursor:pointer;
 transition:.3s;
}

.btn:hover{
 transform:scale(1.03);
 filter:brightness(1.2);
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="menu" id="menu">
<button onclick="toggleMenu()">← Voltar</button>

<h3>Escolher Tema</h3>

<div class="palette" id="palette"></div>

<h3>Volume</h3>
<input type="range" min="0" max="1" step="0.01" oninput="setVolume(this.value)">
</div>

<div class="container">
<div class="main">

<div style="display:flex;justify-content:space-between">
<div class="logo">YORU SYSTEM</div>
<div class="time" id="time"></div>
</div>

<img class="avatar" src="https://i.ibb.co/6RCGNGD4/bf962842325b.jpg">

<h1>Yoru Sistema Inteligente</h1>

<button class="btn" onclick="toggleMusic()">Play / Pause</button>

<button class="btn" onclick="window.open('https://whatsapp.com/channel/0029Vb5wx3GId7nT87R9gn3L')">
Canal Oficial
</button>

<button class="btn" onclick="window.open('https://wa.me/5599999999999')">
Falar com o Dono
</button>

</div>
</div>

<audio id="music"></audio>

<script>
/* TEMA DO SISTEMA */
function detectTheme(){
 if(window.matchMedia('(prefers-color-scheme: light)').matches){
  document.documentElement.style.setProperty('--card-bg','rgba(0,0,0,0.6)')
  document.documentElement.style.setProperty('--text-color','#000')
 }else{
  document.documentElement.style.setProperty('--card-bg','rgba(255,255,255,0.04)')
  document.documentElement.style.setProperty('--text-color','#fff')
 }
}

/* CORES PERMITIDAS (SEM BRANCO, PRETO, AMARELO) */
let colors=[
 "#ff4d88","#6c5cff","#00c2ff","#00ffb3",
 "#ff3c3c","#9d4edd","#00b4d8","#2ec4b6"
]

let palette=document.getElementById("palette")

colors.forEach(c=>{
 let el=document.createElement("div")
 el.className="color"
 el.style.background=c
 el.onclick=()=>setColor(c,el)
 palette.appendChild(el)
})

function setColor(c,el){
 document.documentElement.style.setProperty('--main-color',c)
 localStorage.setItem("yoru_color",c)

 document.querySelectorAll('.color').forEach(e=>e.classList.remove('active'))
 el.classList.add('active')
}

/* SALVAR COR */
let saved=localStorage.getItem("yoru_color")
if(saved){
 document.documentElement.style.setProperty('--main-color',saved)
}

/* PLAYER */
let music=document.getElementById("music")
music.src="https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3"

function toggleMusic(){music.paused?music.play():music.pause()}
function setVolume(v){music.volume=v}

/* MENU */
function toggleMenu(){
 document.getElementById("menu").classList.toggle("active")
}

/* RELÓGIO */
setInterval(()=>{
 let d=new Date()
 document.getElementById("time").innerText=
 d.getHours()+":"+String(d.getMinutes()).padStart(2,'0')
},1000)

/* INICIAR */
detectTheme()
</script>

</body>
</html>
