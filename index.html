<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --main-color:#ff4d88;
}

body{
  font-family:'Inter',sans-serif;
  background:#040406;
  color:#fff;
  overflow-x:hidden;
  transition:.3s;
}

/* blur fundo quando menu abre */
body.menu-open::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(5px);
  z-index:5;
}

.container{
  max-width:850px;
  margin:80px auto;
  padding:20px;
  position:relative;
  z-index:1;
}

.main{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:40px 25px;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 0 60px rgba(255,77,136,0.1);
  text-align:center;
}

.logo{
  font-family:'Orbitron';
  color:var(--main-color);
}

.time{
  background:rgba(255,255,255,0.05);
  padding:8px 14px;
  border-radius:20px;
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  margin:20px auto;
  box-shadow:0 0 30px var(--main-color);
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.btn{
  margin-top:25px;
  width:100%;
  padding:18px;
  border-radius:18px;
  border:none;
  background:linear-gradient(135deg,var(--main-color),var(--main-color));
  color:#fff;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px var(--main-color);
}

.controls{
  margin-top:20px;
  display:flex;
  gap:10px;
  justify-content:center;
}

.small-btn{
  padding:10px 14px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
  background:transparent;
  color:#fff;
  cursor:pointer;
}

/* menu */
.menu-btn{
  position:fixed;
  top:20px;
  right:20px;
  font-size:22px;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  padding:10px 14px;
  border-radius:12px;
  z-index:10;
}

.menu{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:#0a0a0f;
  padding:25px;
  transition:.35s cubic-bezier(.77,0,.18,1);
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:10;
}

.menu.active{
  right:0;
}

.menu button{
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  color:#fff;
  cursor:pointer;
}

.colors{
  display:flex;
  gap:10px;
}

.color{
  width:25px;
  height:25px;
  border-radius:50%;
  cursor:pointer;
}

.pink{background:#ff4d88}
.blue{background:#4da6ff}
.purple{background:#a64dff}
.green{background:#4dff88}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="menu" id="menu">
  <button onclick="toggleMenu()">← Voltar</button>

  <h3>Tema</h3>
  <div class="colors">
    <div class="color pink" onclick="setColor('#ff4d88')"></div>
    <div class="color blue" onclick="setColor('#4da6ff')"></div>
    <div class="color purple" onclick="setColor('#a64dff')"></div>
    <div class="color green" onclick="setColor('#4dff88')"></div>
  </div>

  <button onclick="saveTheme()">Salvar tema</button>
</div>

<div class="container">
<div class="main">

<div style="display:flex;justify-content:space-between">
  <div class="logo">YORU SYSTEM</div>
  <div class="time" id="time"></div>
</div>

<img class="avatar" src="https://i.ibb.co/6RCGNGD4/bf962842325b.jpg">

<h1>Automação com controle real</h1>

<button class="btn" onclick="window.open('https://whatsapp.com/channel/0029Vb5wx3GId7nT87R9gn3L')">
Canal Oficial
</button>

<div class="controls">
  <button class="small-btn" onclick="toggleMusic()">Música</button>
  <button class="small-btn" onclick="nextMusic()">Próxima</button>
</div>

</div>
</div>

<audio id="music"></audio>

<script>
// relógio
setInterval(()=>{
 let d = new Date()
 document.getElementById("time").innerText =
 d.getHours()+":"+String(d.getMinutes()).padStart(2,'0')
},1000)

// música
let playlist=[
"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3",
"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/7713x1kpz.mp3"
]

let i=0
let music=document.getElementById("music")
music.src=playlist[i]

function toggleMusic(){
 music.paused ? music.play() : music.pause()
}

function nextMusic(){
 i=(i+1)%playlist.length
 music.src=playlist[i]
 music.play()
}

// menu
function toggleMenu(){
 let menu = document.getElementById("menu")
 menu.classList.toggle("active")
 document.body.classList.toggle("menu-open")
}

// tema
function setColor(color){
 document.documentElement.style.setProperty('--main-color', color)
 localStorage.setItem("yoru_color", color)
}

function saveTheme(){
 alert("Tema salvo")
}

// carregar tema salvo
let saved = localStorage.getItem("yoru_color")
if(saved){
 document.documentElement.style.setProperty('--main-color', saved)
}

// fechar clicando fora
document.addEventListener("click", function(e){
  let menu = document.getElementById("menu")
  let btn = document.querySelector(".menu-btn")

  if(menu.classList.contains("active")){
    if(!menu.contains(e.target) && !btn.contains(e.target)){
      menu.classList.remove("active")
      document.body.classList.remove("menu-open")
    }
  }
})
</script>

</body>
</html>
